<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四 方 · 网 域 导 航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf6f0;font-family:'Georgia','Times New Roman','Songti SC',serif;color:#2c2c2c;min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:60px 24px 40px}
.header{border-bottom:2px solid #2c2c2c;padding-bottom:20px;margin-bottom:40px}
.header h1{font-size:28px;font-weight:700;letter-spacing:4px;text-transform:uppercase;line-height:1.2}
.header .sub{font-size:13px;color:#888;margin-top:6px;letter-spacing:2px;font-style:italic}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:#ddd}
.item{background:#fff;padding:20px;text-decoration:none;color:#2c2c2c;transition:all .2s;position:relative}
.item:hover{background:#f5f0e8}
.item:before{content:'';display:block;width:24px;height:2px;background:#2c2c2c;margin-bottom:12px}
.item .domain{font-size:17px;font-weight:700;letter-spacing:.5px;font-family:'Courier New',monospace}
.item .desc{font-size:12px;color:#999;margin-top:4px;letter-spacing:1px}
.item:hover .domain{color:#666}
.footer{margin-top:50px;text-align:center;font-size:11px;color:#bbb;letter-spacing:1px;border-top:1px solid #eee;padding-top:24px}
.info{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:#ddd;margin-top:32px}
.info .box{background:#faf6f0;padding:12px 16px;font-size:11px;color:#888;letter-spacing:.5px}
@media(max-width:500px){.grid,.info{grid-template-columns:1fr}.wrap{padding:36px 16px 24px}.header h1{font-size:22px}}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
<h1>四 方 网 域</h1>
<div class="sub">— 四 处 目 的 地 · 一 张 导 航 图 —</div>
</div>

</a>

</a>

</a>
</div>

<div class="footer">⊛ 六 站 联 动 · 独 立 风 格 ⊛</div>
</div>
</body>
</html>
